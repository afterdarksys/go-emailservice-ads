apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-primary
  namespace: mail-system
  labels:
    app: go-emailservice-ads
    tier: primary
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: go-emailservice-ads
      tier: primary
  template:
    metadata:
      labels:
        app: go-emailservice-ads
        tier: primary
    spec:
      containers:
      - name: goemailservices
        image: afterdarksys/go-emailservice-ads:latest
        imagePullPolicy: Always
        ports:
        - name: smtp
          containerPort: 2525
          protocol: TCP
        - name: rest-api
          containerPort: 8080
          protocol: TCP
        - name: grpc-api
          containerPort: 50051
          protocol: TCP
        - name: replication
          containerPort: 9090
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: STORAGE_PATH
          value: "/var/lib/mail-storage"
        - name: REPLICATION_MODE
          value: "primary"
        volumeMounts:
        - name: config
          mountPath: /opt/goemailservices/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: storage
          mountPath: /var/lib/mail-storage
        - name: logs
          mountPath: /var/log/mail
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: mail-config
      - name: storage
        persistentVolumeClaim:
          claimName: mail-storage-pvc
      - name: logs
        emptyDir: {}
