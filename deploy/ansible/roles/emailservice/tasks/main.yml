---
# Email service deployment tasks

- name: Clone or update email service repository
  git:
    repo: https://github.com/afterdarksystems/go-emailservice-ads.git
    dest: "{{ app_dir }}/source"
    version: main
    force: yes
  become_user: "{{ app_user }}"
  when: deploy_from_git | default(false)

- name: Sync local source to server
  synchronize:
    src: "{{ playbook_dir }}/../../"
    dest: "{{ app_dir }}/source/"
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=data"
      - "--exclude=bin"
      - "--exclude=*.log"
      - "--exclude=deploy/ansible"
  become_user: "{{ app_user }}"
  when: not (deploy_from_git | default(false))

- name: Generate SSL certificates with Let's Encrypt
  command: >
    certbot certonly --standalone --non-interactive --agree-tos
    --email {{ letsencrypt_email }}
    -d {{ email_domain }}
  args:
    creates: "/etc/letsencrypt/live/{{ email_domain }}/fullchain.pem"
  when: letsencrypt_enabled | default(false)

- name: Create self-signed SSL certificates for testing
  block:
    - name: Generate private key
      openssl_privatekey:
        path: "{{ certs_dir }}/server.key"
        size: 2048
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0600'

    - name: Generate self-signed certificate
      openssl_certificate:
        path: "{{ certs_dir }}/server.crt"
        privatekey_path: "{{ certs_dir }}/server.key"
        provider: selfsigned
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0644'
        selfsigned_not_after: "+3650d"  # 10 years
        subject:
          CN: "{{ email_domain }}"
          O: "After Dark Systems"
          OU: "Email Services"
  when: not (letsencrypt_enabled | default(false))

- name: Link Let's Encrypt certificates
  block:
    - name: Link certificate
      file:
        src: "/etc/letsencrypt/live/{{ email_domain }}/fullchain.pem"
        dest: "{{ certs_dir }}/server.crt"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_group }}"

    - name: Link private key
      file:
        src: "/etc/letsencrypt/live/{{ email_domain }}/privkey.pem"
        dest: "{{ certs_dir }}/server.key"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
  when: letsencrypt_enabled | default(false)

- name: Create email service configuration
  template:
    src: config.yaml.j2
    dest: "{{ app_dir }}/config.yaml"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0640'
  notify: restart emailservice

- name: Create Docker Compose file
  template:
    src: docker-compose.production.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0640'
  notify: restart emailservice

- name: Create environment file for Docker Compose
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0600'
  notify: restart emailservice

- name: Build Docker image
  community.docker.docker_image:
    name: "{{ registry }}/{{ app_name }}"
    tag: "{{ image_version }}"
    source: build
    build:
      path: "{{ app_dir }}/source"
      dockerfile: Dockerfile
      pull: yes
    state: present
    force_source: yes
  become_user: "{{ app_user }}"

- name: Create systemd service for email service
  template:
    src: emailservice.service.j2
    dest: /etc/systemd/system/emailservice.service
    mode: '0644'
  notify:
    - reload systemd
    - restart emailservice

- name: Enable and start email service
  systemd:
    name: emailservice
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for service to be healthy
  uri:
    url: "http://localhost:{{ api_port }}/health"
    method: GET
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 5
  ignore_errors: yes

- name: Create backup script
  template:
    src: backup.sh.j2
    dest: "{{ app_dir }}/backup/backup.sh"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0750'

- name: Configure daily backup cron job
  cron:
    name: "Email service backup"
    minute: "0"
    hour: "2"
    job: "{{ app_dir }}/backup/backup.sh >> {{ log_dir }}/backup.log 2>&1"
    user: "{{ app_user }}"

- name: Configure certificate renewal cron job
  cron:
    name: "Renew Let's Encrypt certificates"
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "certbot renew --quiet && systemctl restart emailservice"
    user: root
  when: letsencrypt_enabled | default(false)
