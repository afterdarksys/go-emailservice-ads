apiVersion: apps/v1
kind: Deployment
metadata:
  name: goemailservices
  namespace: email-system
  labels:
    app: goemailservices
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: goemailservices
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: goemailservices
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: goemailservices
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: goemailservices
        image: goemailservices:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: smtp
          containerPort: 25
          protocol: TCP
        - name: submission
          containerPort: 587
          protocol: TCP
        - name: imaps
          containerPort: 993
          protocol: TCP
        - name: http-api
          containerPort: 8080
          protocol: TCP
        - name: grpc-api
          containerPort: 50051
          protocol: TCP
        env:
        - name: GOMAXPROCS
          value: "4"
        - name: TZ
          value: "UTC"
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "4000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/goemailservices
          readOnly: true
        - name: data
          mountPath: /var/lib/goemailservices
        - name: tls-certs
          mountPath: /etc/goemailservices/certs
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: goemailservices-config
      - name: data
        persistentVolumeClaim:
          claimName: goemailservices-data
      - name: tls-certs
        secret:
          secretName: goemailservices-tls
