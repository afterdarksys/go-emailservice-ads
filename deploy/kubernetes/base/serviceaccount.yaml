apiVersion: v1
kind: ServiceAccount
metadata:
  name: smtp-service
  namespace: mail-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smtp-role
  namespace: mail-system
rules:
- apiGroups: [""]
  resources: ["pods", "endpoints", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smtp-rolebinding
  namespace: mail-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smtp-role
subjects:
- kind: ServiceAccount
  name: smtp-service
  namespace: mail-system
