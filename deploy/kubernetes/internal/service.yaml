apiVersion: v1
kind: Service
metadata:
  name: smtp-internal
  namespace: mail-system
  labels:
    app: smtp
    component: internal-hub
spec:
  type: ClusterIP
  selector:
    app: smtp
    component: internal-hub
  ports:
  - name: internal-smtp
    port: 2525
    targetPort: 2525
    protocol: TCP
  - name: submission
    port: 587
    targetPort: 587
    protocol: TCP
