version: '3.8'

services:
  email-service:
    image: goemailservices:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: goemailservices
    restart: unless-stopped
    ports:
      - "25:25"           # SMTP
      - "587:587"         # SMTP Submission (MSA)
      - "993:993"         # IMAPS
      - "8080:8080"       # REST API
      - "50051:50051"     # gRPC API
    volumes:
      - email-data:/var/lib/goemailservices
      - email-logs:/var/log/goemailservices
      - ./config/production.yaml:/etc/goemailservices/config.yaml:ro
      - ./certs:/etc/goemailservices/certs:ro
    environment:
      - GOMAXPROCS=4
      - TZ=UTC
    networks:
      - email-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - email-network
    depends_on:
      - email-service

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    networks:
      - email-network
    depends_on:
      - prometheus

  # Nginx reverse proxy (optional - for production SSL termination)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - email-network
    depends_on:
      - email-service
      - grafana

volumes:
  email-data:
    driver: local
  email-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  email-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
