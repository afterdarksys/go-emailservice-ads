# nginx configuration for go-emailservice-ads
# This configuration provides:
# - SSL termination for HTTP API
# - Rate limiting
# - Load balancing (when multiple instances run)
# - Security headers

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=metrics_limit:10m rate=10r/s;

    # Upstream backend servers
    upstream email_api {
        least_conn;
        server email-service:8080 max_fails=3 fail_timeout=30s;
        # Add more servers for load balancing:
        # server email-service-2:8080 max_fails=3 fail_timeout=30s;
        # server email-service-3:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name mail-api.example.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server for API
    server {
        listen 443 ssl http2;
        server_name mail-api.example.com;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://email_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Readiness check endpoint (no rate limit)
        location /ready {
            proxy_pass http://email_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Metrics endpoint (rate limited)
        location /metrics {
            limit_req zone=metrics_limit burst=20 nodelay;
            proxy_pass http://email_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Restrict access to monitoring systems
            allow 10.0.0.0/8;      # Internal network
            allow 172.16.0.0/12;   # Docker networks
            deny all;
        }

        # API endpoints (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            # Authentication required
            auth_basic "Email Service API";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://email_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Default deny
        location / {
            return 404;
        }
    }
}

# Stream module for SMTP/IMAP proxying (if needed)
stream {
    log_format proxy '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /var/log/nginx/stream_access.log proxy;

    # SMTP proxy (if load balancing SMTP)
    upstream smtp_backend {
        least_conn;
        server email-service:25 max_fails=2 fail_timeout=10s;
        # Add more servers:
        # server email-service-2:25 max_fails=2 fail_timeout=10s;
    }

    # SMTP submission proxy
    upstream submission_backend {
        least_conn;
        server email-service:587 max_fails=2 fail_timeout=10s;
    }

    # IMAPS proxy
    upstream imaps_backend {
        least_conn;
        server email-service:993 max_fails=2 fail_timeout=10s;
    }

    # Uncomment to enable SMTP proxying
    # server {
    #     listen 25;
    #     proxy_pass smtp_backend;
    #     proxy_timeout 300s;
    #     proxy_connect_timeout 30s;
    # }

    # Uncomment to enable submission proxying
    # server {
    #     listen 587;
    #     proxy_pass submission_backend;
    #     proxy_timeout 300s;
    #     proxy_connect_timeout 30s;
    # }

    # Uncomment to enable IMAPS proxying
    # server {
    #     listen 993;
    #     proxy_pass imaps_backend;
    #     proxy_timeout 300s;
    #     proxy_connect_timeout 30s;
    # }
}
